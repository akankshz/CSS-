<!DOCTYPE html>
<html lang="en">
<head>
    <title>flexbox direction</title>
    <style>                                 /*moved the css file to html file*/
        *{                                  /*this can be linked to css file*/
    margin:0 ;
    padding:0 ;
}
.box{
    height: 100px;
    width: 100px;
    margin: 3px solid black;
    margin-right: 5px;
}
#heading{margin-left: 300px;
margin-top: 50px;}
#container{
    height:200px ;
    width: 800px;
    border: 3px solid black;
    margin: 20px;
    padding: 10px;
    display: flex;
    justify-content: space-between;  /*puts a space between the boxes*/
    /*space-between,center,flex-end,flex-start,alignment*/                           
    flex-direction:row-reverse;
    flex-wrap: wrap-reverse;
}
#box1{background-color: aqua; order: 2;}
/*the order can be determined, overriding the original order in HTML file*/
#box2{background-color: blue; order: 3;}
/*flex grow option also available, defines how much flex item will grow relative to others*/
#box3{background-color: blueviolet; align-self: center; flex-shrink: 4; order: 1;}
/*flex shrink is used to define how much the box will shrink relative to others*/
#box4{background-color: chartreuse; order: 4;} 
/*flexbox grid and media queries*/
    </style> 
</head>
<body>
    <h1 id="heading">Flexbox Direction</h1>
    <div id="container">
        <div id="box1" class="box">Flex Item 1</div>
        <div id="box2" class="box">Flex Item 2</div>
        <div id="box3" class="box">Flex Item 3</div>
        <div id="box4" class="box">Flex Item 4</div>
    </div>
</body>
</html>
