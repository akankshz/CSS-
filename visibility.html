<!DOCTYPE html>
<html lang="en">
<head>
    <title>visibility</title>
    <style>
        .box{height : 70px; width : 70px;}
        #box1{background-color: blue; visibility: visible;}
        #box2{background-color: aquamarine; visibility: visible;}
        
    </style>
</head>
<body>
    
    <div id = "box1" class = "box">Box 1</div><br>
    <div id = "box2" class = "box">Box 2</div><br>
</body>
</html>
