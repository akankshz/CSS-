<!DOCTYPE html>
<html lang="en">
<head>
    <title>inline styling</title>
    <style>
    .box1{
        height : 100px;
        width : 100px;
        margin : 10px;
        background-color: blueviolet;
        text-align : center;
        border: 5px solid black;
        border-radius : 10px;
        display : inline;
    }
    .box2{
        height : 100px;
        width : 100px;
        margin : 10px;
        background-color: blueviolet;
        text-align : center;
        border: 5px solid black;
        border-radius : 10px;
        display : inline-block;
    }
    .box3{
        height : 100px;
        width : 100px;
        margin : 10px;
        background-color: blueviolet;
        text-align : center;
        border: 5px solid black;
        border-radius : 10px;
        display : block;
    }
    .box4{
        height : 100px;
        width : 100px;
        margin : 10px;
        background-color: blueviolet;
        text-align : center;
        border: 5px solid black;
        border-radius : 10px;
        display : inline-flex;
    }
    </style>
</head>
<body>
    <br>
    inline
    <br><hr>
    <div id="div1" class ="box1">box1</div>
    <div id="div2" class ="box1">box2</div>
    <div id="div3" class ="box1">box3</div>
    <hr>
    inline block<hr>
    <div id="div1" class ="box2">box1</div>
    <div id="div2" class ="box2">box2</div>
    <div id="div3" class ="box2">box3</div>
    <br><hr>inline flex<hr>
    <div id="div1" class ="box4">box1</div>
    <div id="div2" class ="box4">box2</div>
    <div id="div3" class ="box4">box3</div>
    <br><hr>block<hr>
    <div id="div1" class ="box3">box1</div>
    <div id="div2" class ="box3">box2</div>
    <div id="div3" class ="box3">box3</div>
</body>
</html>
